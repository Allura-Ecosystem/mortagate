<template>
    <section class="outcome">
        <div class="body">
            <span class={chipClass}>{chipLabel}</span>
            <h1 class="verdict">{verdictHeadline}</h1>

            <!-- Approved -->
            <template lwc:if={isApproved}>
                <p class="amount">{formattedAmount}</p>
                <template lwc:if={rate}>
                    <p class="supporting">Estimated rate: {rate}%</p>
                </template>
                <template lwc:if={isConditions}>
                    <p class="supporting">A few conditions apply. We&rsquo;ll walk you through them on the call.</p>
                </template>
                <button type="button" class="cta" onclick={handleScheduleCall}>Schedule a call</button>
            </template>

            <!-- Pending -->
            <template lwc:if={isPending}>
                <p class="supporting">A specialist is reviewing your file. We&rsquo;ll email you the moment there&rsquo;s news.</p>
            </template>

            <!-- Declined: specific reason + a forward path, never a dead end -->
            <template lwc:if={isDeclined}>
                <template lwc:if={declineReason}>
                    <p class="reason">{declineReason}</p>
                </template>
                <p class="supporting">Here&rsquo;s what can help, and how to take the next step.</p>
                <button type="button" class="cta" onclick={handleNextSteps}>See next steps</button>
                <!-- The formal notice of action taken (ECOA / Reg B), owed on a decline -->
                <template lwc:if={hasAdverseNotice}>
                    <button type="button" class="notice-link" onclick={handleViewNotice}>
                        View your notice of action taken
                    </button>
                </template>
            </template>
            <!-- The receipt exists regardless of the answer — every decision has one -->
            <template lwc:if={hasReceipt}>
                <button type="button" class="receipt-link" onclick={handleViewReceipt}>
                    View your decision receipt
                </button>
            </template>
        </div>

        <!-- The amber accent bar is present in every state -->
        <div class="accent-bar" aria-hidden="true"></div>
    </section>
</template>
