<template>
    <section class="room">
        <div class="body">
            <!-- Pending empty state — heartbeat, not a spinner; one line -->
            <template lwc:if={hasEvents}>
                <ul class="timeline">
                    <template for:each={displayEvents} for:item="e">
                        <li key={e.id} class="event">
                            <span class="dot" aria-hidden="true"></span>
                            <div class="event-text">
                                <p class="event-label">{e.label}</p>
                                <p class="event-time">{e.timestamp}</p>
                            </div>
                        </li>
                    </template>
                </ul>
            </template>

            <template lwc:else>
                <div class="pending">
                    <span class="pulse" aria-hidden="true"></span>
                    <p class="pending-line" aria-live="polite">
                        Your file is under review. This timeline updates in real time.
                    </p>
                </div>
            </template>
        </div>

        <div class="accent-bar" aria-hidden="true"></div>
    </section>
</template>
