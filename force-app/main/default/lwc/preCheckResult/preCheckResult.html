<template>
    <section class="precheck">
        <div class="body">
            <!-- Loading -->
            <template lwc:if={loading}>
                <p class="loading" aria-live="polite">Working out your range&hellip;</p>
            </template>

            <!-- Error: human message + retry, never a code -->
            <template lwc:if={error}>
                <h2 class="headline">We&rsquo;re having trouble right now.</h2>
                <p class="supporting">Your info is safe. Try again in a moment.</p>
                <button type="button" class="cta" onclick={handleRetry}>Try again</button>
            </template>

            <!-- Result -->
            <template lwc:if={band}>
                <span class={chipClass}>{chipLabel}</span>
                <p class="range" aria-live="polite">{rangeLabel}</p>
                <p class="supporting">{guidance}</p>

                <div class="email-capture">
                    <label class="email-label" for="email">Ready to apply? Enter your email to continue.</label>
                    <input
                        id="email"
                        type="email"
                        class="number-field"
                        inputmode="email"
                        placeholder="you@example.com"
                        value={email}
                        oninput={handleEmail} />
                    <button
                        type="button"
                        class="cta"
                        disabled={cannotContinue}
                        onclick={handleContinue}>Continue</button>
                </div>
            </template>
        </div>

        <!-- Signature amber accent bar -->
        <div class="accent-bar" aria-hidden="true"></div>
    </section>
</template>
