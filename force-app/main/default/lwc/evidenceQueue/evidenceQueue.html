<template>
    <section class="queue">
        <div class="body">
            <template lwc:if={isComplete}>
                <h2 class="prompt">That&rsquo;s everything we need. Sit tight.</h2>
            </template>

            <template lwc:else>
                <!-- Orientation — Inter, white@70%, not amber -->
                <p class="orientation">{orientation}</p>
                <h2 class="prompt">{prompt}</h2>

                <!-- Success line for the just-finished document -->
                <template lwc:if={justCompleted}>
                    <p class="encouragement" aria-live="polite">{encouragement}</p>
                </template>

                <!-- Upload -->
                <template lwc:else>
                    <lightning-file-upload
                        label="Drag and drop, or choose a file"
                        name="evidenceUpload"
                        accept={acceptedFormats}
                        record-id={recordId}
                        onuploadfinished={handleUploadFinished}>
                    </lightning-file-upload>
                </template>

                <!-- Human error + retry, no codes -->
                <template lwc:if={hasError}>
                    <p class="error" role="alert">{errorMessage}</p>
                    <button type="button" class="cta" onclick={handleRetry}>Try again</button>
                </template>
            </template>
        </div>

        <div class="accent-bar" aria-hidden="true"></div>
    </section>
</template>
