<template>
    <div class="orchestrator">

        <!-- Error banner -->
        <template lwc:if={hasError}>
            <div class="error-banner" role="alert">
                <p class="error-text">{error}</p>
                <button class="error-dismiss" onclick={handleDismissError} aria-label="Dismiss error">
                    &times;
                </button>
            </div>
        </template>

        <!-- Loading overlay -->
        <template lwc:if={loading}>
            <div class="loading-overlay" aria-live="polite" aria-label="Processing">
                <div class="spinner"></div>
            </div>
        </template>

        <!-- Back button (visible on Intent and PreCheck only) -->
        <template lwc:if={canGoBack}>
            <button class="back-btn" onclick={handleBack} aria-label="Go back">
                &larr; Back
            </button>
        </template>

        <!-- Screen 1: Welcome -->
        <template lwc:if={isWelcome}>
            <c-welcome-gate onstart={handleStart}></c-welcome-gate>
        </template>

        <!-- Screen 2: Intent Capture -->
        <template lwc:if={isIntent}>
            <c-intent-capture onintentcaptured={handleIntentCaptured}></c-intent-capture>
        </template>

        <!-- Screen 3: Pre-Check Result -->
        <template lwc:if={isPreCheck}>
            <c-pre-check-result
                loan-purpose={loanPurpose}
                property-value={propertyValue}
                annual-income={annualIncome}
                onemailcaptured={handleEmailCaptured}>
            </c-pre-check-result>
        </template>

        <!-- Screen 4: Evidence Queue -->
        <template lwc:if={isEvidence}>
            <c-evidence-queue
                record-id={applicationId}
                onqueuecomplete={handleQueueComplete}>
            </c-evidence-queue>
        </template>

        <!-- Screen 5: Decision Room -->
        <template lwc:if={isDecisionRoom}>
            <c-decision-room events={decisionEvents}></c-decision-room>
        </template>

        <!-- Screen 6: Outcome -->
        <template lwc:if={isOutcome}>
            <c-outcome-view
                outcome={decisionOutcome}
                decision-event-id={decisionEventId}
                decline-reason={declineReason}
                onschedulecall={handleScheduleCall}
                onnextsteps={handleNextSteps}
                onviewreceipt={handleViewReceipt}
                onviewnotice={handleViewNotice}>
            </c-outcome-view>
        </template>
    </div>
</template>
